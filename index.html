<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Button Border Effect</title>
	<style>
		* {
			margin: 0;
			padding: 0;
		}

		body {
			background-color: #212121
		}

		section {
			display: flex;
			justify-content: center;
			align-items: center;
			width: 100%;
			height: 100vh;
		}

		button {
			font-size: 20px;
			padding: 10px 20px;
			border: none;
			position: relative;
			background-color: transparent;
			color: #212121;
			transition: 0.22s all ease-in-out;
			cursor: pointer;
		}

		button::before {
			position: absolute;
			content: '';
			border-top: #212121 solid 3px;
			border-left: #212121 solid 3px;
			width: 10%;
			height: 30%;
			top: -3px;
			left: -3px;
			transition: 0.17s all ease-in-out;
		}

		button::after {
			position: absolute;
			content: '';
			border-bottom: #212121 solid 3px;
			border-right: #212121 solid 3px;
			width: 10%;
			height: 30%;
			bottom: -3px;
			right: -3px;
			transition: 0.45s all ease-in-out;
		}

		button:hover {
			color: #ebebebe6;
			transition: all;
		}

		button:hover::before,
		button:hover::after {
			width: 100%;
			height: 100%;
			border-color: #ffffff;
			transition: 1.7s;
		}

		/* ── CURSOR ── */
		.cursor {
			position: fixed;
			width: 7px;
			height: 7px;
			background: #f0f0f0d0;
			border-radius: 50%;
			pointer-events: none;
			z-index: 9999;
			transform: translate(-50%, -50%);
			transition: transform .55s;
		}

		.cursor-ring {
			position: fixed;
			width: 33px;
			height: 33px;
			border: 1px solid rgba(255, 255, 255, 0.199);
			border-radius: 50%;
			pointer-events: none;
			z-index: 9998;
			transform: translate(-50%, -50%);
			transition: all 0.95s ease;
		}
	</style>
</head>

<body>
	<div class="cursor" id="cursor"></div>
	<div class="cursor-ring" id="cursorRing"></div>
	<script>
		// Custom cursor
		const cursor = document.getElementById('cursor');
		const ring = document.getElementById('cursorRing');
		document.addEventListener('mousemove', e => {
			cursor.style.left = e.clientX + 'px';
			cursor.style.top = e.clientY + 'px';
			setTimeout(() => {
				ring.style.left = e.clientX + 'px';
				ring.style.top = e.clientY + 'px';
			}, 80);
		});
		document.querySelectorAll('a,button').forEach(el => {
			el.addEventListener('mouseenter', () => ring.style.transform = 'translate(-50%,-50%) scale(1.8)');
			el.addEventListener('mouseleave', () => ring.style.transform = 'translate(-50%,-50%) scale(1)');
		});
	</script>
	<section>
		<button>L337</button>
	</section>
</body>

</html>
